<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VolleyballPro • Przerwa</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* ============================================================
       Break-v2 — the OBS "break" scene, reusing display.js layout
       (schedule / standings / bracket) but with a break-specific
       header and no connection indicator (viewers don't care).

       The DOM IDs MATCH display.html exactly, so js/display.js
       renders into them without modification.
       ============================================================ */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: var(--sans);
      background:
        radial-gradient(1400px 800px at 15% 0%, rgba(106,228,255,.22), transparent 60%),
        radial-gradient(1100px 700px at 85% 100%, rgba(165,110,255,.20), transparent 55%),
        var(--bg);
    }

    .dp {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      padding: 12px 16px 16px;
      gap: 10px;
      overflow: hidden; /* never allow the page itself to scroll */
    }

    /* ---------- Header — compact, no connection chip ---------- */
    .dp-header {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 18px;
      padding: 10px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }
    .dp-title h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: .3px;
      background: linear-gradient(90deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* display.js writes "Faza grupowa"/"Play-off" into #modeBadge. On the
       break scene we hide it and use a dedicated #breakChip instead. */
    #modeBadge { display: none !important; }

    #breakChip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(255,196,0,.14);
      border: 1px solid rgba(255,196,0,.42);
      color: #ffd37a;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }
    #breakChip::before { content: "⏸"; font-size: 12px; }

    .dp-clock {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
    }

    /* OBS viewers don't need to see the Supabase connection badge. */
    #conn { display: none !important; }

    /* ---------- Main split ---------- */
    .dp-main {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: 14px;
      min-height: 0;
    }
    .dp-pane {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .dp-pane h2 {
      margin: 0;
      padding: 10px 16px 8px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text);
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .dp-pane h2 .hint {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      font-weight: 600;
    }
    .dp-body {
      padding: 8px 12px 10px;
      overflow: hidden; /* never scroll on break scene */
      flex: 1;
      min-height: 0;
    }

    /* ---------- Schedule rows (single column per court) ---------- */
    #leftBody {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 100%;
    }
    .courtBlock {
      display: flex;
      flex-direction: column;
    }
    .courtHdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px;
      margin: 4px 0 6px;
      background: rgba(255,255,255,.05);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      font-weight: 800;
      font-size: clamp(13px, 1vw, 15px);
      letter-spacing: .8px;
      text-transform: uppercase;
    }
    .mrow {
      display: grid;
      grid-template-columns: 72px 1fr auto auto;
      align-items: center;
      gap: 14px;
      padding: 8px 12px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .mrow:first-of-type { border-top: none; }
    .mrow.live {
      background: linear-gradient(90deg, rgba(255,77,109,.14), transparent 60%);
      border-left: 3px solid var(--danger);
      padding-left: 5px;
    }
    .mrow.confirmed { opacity: .78; }
    .mrow .mtime {
      font-family: var(--mono);
      font-size: clamp(16px, 1.2vw, 20px);
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }
    .mrow .mtime.none { color: var(--muted); font-size: clamp(12px, 0.9vw, 14px); font-weight: 500; }
    .mrow .mteams { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .mrow .mteams .tname {
      font-size: clamp(15px, 1.15vw, 18px);
      font-weight: 700;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mrow .mteams .tname.winner { color: var(--ok); }
    .mrow .mteams .tname.loser { color: var(--muted); }
    .mrow .mstage {
      font-size: clamp(10px, 0.75vw, 12px);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .mrow .msets {
      font-family: var(--mono);
      font-weight: 800;
      font-size: clamp(19px, 1.45vw, 25px);
      letter-spacing: 1.5px;
      text-align: center;
      min-width: 48px;
      color: var(--text);
    }
    .mrow .mpoints {
      font-family: var(--mono);
      font-weight: 700;
      font-size: clamp(13px, 1vw, 16px);
      color: var(--text);
      letter-spacing: .3px;
      text-align: right;
      min-width: 130px;
      opacity: .90;
    }
    /* Hide the stat chip in compact break scene — status is implied by color/opacity. */
    .mrow .mstat { display: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }

    /* ---------- Standings (single column, stacked) ---------- */
    #rightBody {
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: 100%;
    }
    .group { margin-bottom: 0; }
    .groupTitle {
      font-size: clamp(13px, 1vw, 15px);
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: var(--accent);
    }
    table.stand {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(13px, 1vw, 15px);
    }
    table.stand th {
      text-align: right;
      padding: 3px 7px;
      font-size: clamp(10px, 0.78vw, 12px);
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .7px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    table.stand th.l, table.stand td.l { text-align: left; }
    table.stand td {
      padding: 4px 7px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    table.stand td.l { font-weight: 600; }
    table.stand tr.r1 td { background: rgba(45,255,158,.07); }
    table.stand tr.r2 td { background: rgba(106,228,255,.05); }
    table.stand .pts { font-family: var(--mono); font-weight: 800; color: var(--text); font-size: clamp(14px, 1.1vw, 17px); }
    table.stand .rank { width: 26px; color: var(--muted); font-weight: 700; }


    /* ---------- Bracket (moderate, viewport-scaled) ---------- */
    .bracket {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      align-items: stretch;
    }
    .bcol h3 {
      margin: 0 0 8px;
      font-size: clamp(11px, 0.85vw, 13px);
      font-weight: 800;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }
    .bmatch {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: clamp(12px, 0.95vw, 14px);
    }
    .bmatch.live { border-color: rgba(255,77,109,.6); box-shadow: 0 0 10px rgba(255,77,109,.2); }
    .bmatch .side {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 3px 0;
    }
    .bmatch .side.winner { color: var(--ok); font-weight: 700; }
    .bmatch .side.loser { color: var(--muted); }
    .bmatch .side .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .bmatch .side .sc { font-family: var(--mono); font-weight: 800; min-width: 20px; text-align: right; }
    .bmatch .lbl {
      font-size: clamp(10px, 0.75vw, 11px);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .9px;
      margin-bottom: 4px;
    }
    .place9wrap { margin-top: 12px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,.18); }
    .place9wrap h3 { text-align: left; margin-bottom: 8px; }

    /* ---------- Empty ---------- */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .empty b { color: var(--text); display: block; margin-bottom: 6px; font-size: 16px; }

    @media (max-width: 1400px) {
      .bracket { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="dp">
    <header class="dp-header">
      <div class="dp-title">
        <h1 id="tName">—</h1>
      </div>
      <div></div>
      <div id="breakChip">Przerwa</div>
      <div style="display:flex; align-items:center; gap:18px;">
        <div class="dp-clock" id="clock">--:--</div>
        <!-- Hidden: display.js writes into #modeBadge and #conn; we style them away. -->
        <span id="modeBadge"></span>
        <span id="conn"><span class="dot"></span><span id="connLabel"></span></span>
      </div>
    </header>

    <main class="dp-main">
      <section class="dp-pane" id="leftPane">
        <h2><span id="leftTitle">Terminarz</span><span class="hint" id="leftHint"></span></h2>
        <div class="dp-body" id="leftBody">
          <div class="empty"><b>Ładowanie…</b>Proszę czekać, synchronizacja danych.</div>
        </div>
      </section>

      <section class="dp-pane" id="rightPane">
        <h2><span id="rightTitle">Tabela</span><span class="hint" id="rightHint"></span></h2>
        <div class="dp-body" id="rightBody">
          <div class="empty"><b>Ładowanie…</b>Proszę czekać, synchronizacja danych.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/ui-shared.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/state.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/display.js"></script>
</body>
</html>
