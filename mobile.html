<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#070A12" />
  <title>VolleyballPro • Mobile</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* ============================================================
       Mobile-first score entry for the organizer walking between
       courts. Big tap targets, court filter, overwriting confirmed
       matches requires a confirmation prompt.
       ============================================================ */
    html, body { margin: 0; }
    body { font-family: var(--sans); color: var(--text); }

    .mob {
      max-width: 720px;
      margin: 0 auto;
      padding: 14px 12px 80px;
    }

    /* ---------- Header ---------- */
    .mob-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .mob-hd h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .3px;
    }
    .mob-hd .slug {
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }
    .mob-sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 14px;
    }

    /* ---------- PIN card ---------- */
    .pinCard {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .pinCard label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
    .pinCard input {
      width: 100%;
      padding: 14px 14px;
      font-size: 17px;
      font-family: var(--mono);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      color: var(--text);
      outline: none;
    }
    .pinCard .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .btn-primary {
      background: linear-gradient(180deg, var(--accent) 0%, #4cc7ea 100%);
      color: #001219;
      border-color: transparent;
      font-weight: 800;
    }
    .btnBig {
      padding: 14px 18px;
      font-size: 15px;
      border-radius: 12px;
      min-height: 48px;
    }

    /* ---------- Court filter tabs ---------- */
    .courtTabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 6px 0 12px;
      margin: 0 -4px 6px;
      -webkit-overflow-scrolling: touch;
    }
    .courtTab {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    .courtTab.active {
      background: rgba(106,228,255,.15);
      color: var(--accent);
      border-color: rgba(106,228,255,.45);
    }

    /* ---------- Match card ---------- */
    .matches { display: flex; flex-direction: column; gap: 10px; }
    .mCard {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      cursor: pointer;
      min-height: 70px;
      transition: background .15s ease, border-color .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .mCard:active { background: rgba(106,228,255,.08); border-color: rgba(106,228,255,.35); }
    .mCard.confirmed { opacity: .70; }
    .mCard.live { border-color: rgba(255,77,109,.55); box-shadow: 0 0 12px rgba(255,77,109,.18); }
    .mCard .teams {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .mCard .teams .tm {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mCard .teams .tm.winner { color: var(--ok); }
    .mCard .teams .tm.loser { color: var(--muted); }
    .mCard .meta {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-top: 2px;
    }
    .mCard .right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .mCard .score {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      line-height: 1;
    }
    .mCard .stat {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--muted);
    }
    .mCard .stat.live { background: rgba(255,77,109,.18); border-color: rgba(255,77,109,.45); color: var(--danger); }
    .mCard .stat.confirmed { background: rgba(45,255,158,.13); border-color: rgba(45,255,158,.32); color: var(--ok); }
    .mCard .sets {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ---------- Score modal (mobile-sized) ---------- */
    .mobOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .mobModal {
      width: 100%;
      max-width: 520px;
      background: #0D1324;
      border-top: 1px solid rgba(255,255,255,.12);
      border-radius: 22px 22px 0 0;
      padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
      box-shadow: 0 -10px 40px rgba(0,0,0,.6);
      animation: slideUp .22s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .mobModal h2 { margin: 0 0 4px; font-size: 16px; font-weight: 800; }
    .mobModal .matchName { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
    .mobModal .setGrid {
      display: grid;
      grid-template-columns: auto 1fr auto 1fr;
      gap: 10px 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .mobModal .setLbl {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .mobModal .setInp {
      width: 100%;
      padding: 16px 10px;
      font-size: 22px;
      font-family: var(--mono);
      font-weight: 800;
      text-align: center;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(0,0,0,.3);
      color: var(--text);
      outline: none;
      min-height: 56px;
    }
    .mobModal .setInp:focus {
      border-color: var(--accent);
      background: rgba(106,228,255,.08);
    }
    .mobModal .sep { color: var(--muted); font-weight: 800; font-size: 18px; text-align: center; }
    .mobModal .warn {
      color: #ffd37a;
      font-size: 12px;
      min-height: 18px;
      margin: 6px 2px 10px;
    }
    .mobModal .btnRow {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 10px;
    }
    .mobModal .btn { min-height: 52px; font-size: 15px; }

    /* ---------- States ---------- */
    .emptyMsg {
      padding: 30px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .emptyMsg b { display: block; color: var(--text); font-size: 16px; margin-bottom: 6px; }

    /* Toasts (reuse VP_UI toast styles if present, otherwise minimal) */
    .toast {
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translateX(-50%) translateY(-20px);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      z-index: 2000;
      opacity: 0;
      transition: opacity .2s ease, transform .2s ease;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      backdrop-filter: blur(10px);
      color: var(--text);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-success { background: rgba(45,255,158,.2); border-color: rgba(45,255,158,.45); color: var(--ok); }
    .toast-error   { background: rgba(255,77,109,.2); border-color: rgba(255,77,109,.45); color: var(--danger); }
    .toast-warn    { background: rgba(255,196,0,.2); border-color: rgba(255,196,0,.45); color: #ffd37a; }
  </style>
</head>
<body>
  <div class="mob">
    <div class="mob-hd">
      <h1 id="mTitle">Wyniki — tryb mobilny</h1>
      <div class="slug" id="mSlug">—</div>
    </div>
    <div class="mob-sub">Wpisz PIN turnieju, wybierz mecz, wpisz wynik setów. Aktualizuje display i overlay w ~1s.</div>

    <div class="pinCard" id="pinCard">
      <label for="pin">PIN turnieju</label>
      <div class="row">
        <input id="pin" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off" />
        <button class="btn btn-primary btnBig" id="btnLoad">Wczytaj</button>
      </div>
    </div>

    <div id="filterWrap" style="display:none;">
      <div class="courtTabs" id="courtTabs"></div>
    </div>

    <div id="matchList" class="matches">
      <div class="emptyMsg"><b>Wpisz PIN i kliknij „Wczytaj"</b>Pobierzemy wszystkie mecze tego turnieju.</div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/ui-shared.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/state.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/mobile.js"></script>
</body>
</html>
