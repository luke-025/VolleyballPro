<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>VolleyballPro • Overlay</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>

    html, body { height:100%; margin:0; padding:0; overflow:hidden; background:transparent; }
    body { background: transparent; }

    /* === SAFE AREA === */
    :root{
      --safe-l: max(44px, env(safe-area-inset-left));
      --safe-t: max(44px, env(safe-area-inset-top));
      --safe-r: max(44px, env(safe-area-inset-right));
      --safe-b: max(44px, env(safe-area-inset-bottom));
    }
    .gameHUD{ position:absolute; left: var(--safe-l); top: var(--safe-t); display:flex; flex-direction:column; gap:12px; }

    .overlayViewport {
        position: fixed; inset: 0; width: 100vw; height: 100vh;
        overflow: hidden;
    }
    .overlayStage {
        width: 1920px; height: 1080px;
        transform-origin: center center;
        position: absolute;
        top: 50%; left: 50%;
        margin-left: -960px;
        margin-top: -540px;
        overflow: hidden;
        background: transparent;
        font-family: var(--sans);
    }

    .scene{ position:absolute; inset:0; opacity:0; pointer-events:none; transition: opacity 420ms ease; }
    .scene.active{ opacity:1; pointer-events:auto; }

    /* === GAME meta pills === */
    .gameMeta{ display:flex; gap:10px; align-items:center; justify-content:flex-start; margin-bottom: 2px; }
    .metaPill{
      height: 32px; padding: 8px 12px; border-radius: 999px;
      background: rgba(10,12,16,.70); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.92); font-weight: 900; font-size: 13px;
      letter-spacing: .35px; text-transform: uppercase; backdrop-filter: blur(10px);
      box-shadow: 0 14px 40px rgba(0,0,0,.22); display:flex; align-items:center;
      white-space: nowrap; max-width: 820px; overflow:hidden; text-overflow: ellipsis;
    }

    .scene-game{ position:absolute; inset:0; }

    /* ── Unified Game Card ── */
    .gameCard {
      width: 580px;
      background: rgba(10,12,16,.88);
      border: 1.5px solid rgba(255,255,255,.10);
      border-radius: 22px;
      overflow: hidden;
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 60px rgba(0,0,0,.48);
    }
    .gameCardTeam {
      display: flex;
      align-items: stretch;
      min-height: 76px;
    }
    .gameCardInfo {
      flex: 1;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      position: relative;
    }
    /* Serve indicator — absolute so it doesn't offset teamName centering */
    .gameCardInfo .serveIndicator {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }
    .teamName {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .2px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      text-align: center;
    }
    #rowA .teamName { color: #2DFF9E; }
    #rowB .teamName { color: #6AE4FF; }

    .gameCardMeta {
      width: 82px;
      flex-shrink: 0;
      border-left: 1px solid rgba(255,255,255,.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 10px 8px;
    }
    .setsLabel {
      font-size: 10px;
      font-weight: 700;
      text-transform: lowercase;
      color: rgba(255,255,255,.35);
      letter-spacing: .3px;
      text-align: center;
    }
    .setsVal {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      text-align: center;
    }
    .gameCardScore {
      width: 92px;
      flex-shrink: 0;
      border-left: 1px solid rgba(255,255,255,.07);
      display: flex;
      align-items: stretch;
    }
    .gameCardScore .pointsNum {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 1000;
      color: #0b0f16;
      background: rgba(255,255,255,.94);
      letter-spacing: .5px;
    }
    .gameCardDivider { height: 1px; background: rgba(255,255,255,.08); }

    /* ── Bottom strip ── */
    .gameCardBottom {
      padding: 9px 20px 11px;
      border-top: 1px solid rgba(255,255,255,.07);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .setHistoryInline { display: flex; gap: 6px; align-items: center; }
    .setPill {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 7px;
      padding: 2px 9px;
      font-size: 12px;
      font-family: var(--mono, monospace);
      color: rgba(255,255,255,.45);
      white-space: nowrap;
    }
    .setPill .setNum { font-size: 9px; opacity: .55; margin-right: 3px; letter-spacing: .5px; font-weight: 700; }
    .setPill.winA { border-color: rgba(45,255,158,.35); color: #2DFF9E; background: rgba(45,255,158,.07); }
    .setPill.winB { border-color: rgba(106,228,255,.35); color: #6AE4FF; background: rgba(106,228,255,.07); }

    .momentumInlineWrap { flex: 1; min-width: 60px; }
    .momentumInlineBar {
      display: flex; height: 4px; border-radius: 2px;
      overflow: hidden; background: rgba(255,255,255,.05);
    }
    .momentumFill { transition: width 0.7s cubic-bezier(.4,0,.2,1); min-width: 0; }
    .momentumA { background: #2DFF9E; }
    .momentumSep { width: 2px; background: rgba(255,255,255,.12); flex-shrink: 0; }
    .momentumB { background: #6AE4FF; }
    .momentumLabel { margin-top: 4px; font-size: 10px; color: rgba(255,255,255,.28); letter-spacing: .3px; }

    /* Allow point pulse animation */
    .pointsNum{ will-change: transform, filter; }

    /* === SPONSOR WIDGET === */
    #sponsorWidget{
      position: absolute; top: 46px; right: 46px; width: 280px; height: 96px;
      border-radius: 14px; background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2); display: flex;
      align-items: center; justify-content: center; padding: 14px;
      opacity: 0; transition: opacity 600ms ease; z-index: 100;
    }
    #sponsorWidget.show{ opacity: 1; }
    #sponsorWidget img{ max-width: 100%; max-height: 100%; object-fit: contain; }

    /* ====================================================
       TECHNICAL scene — "ZARAZ WRACAMY" / stream paused.
       Cinematic redesign: animated mesh background, shimmer
       title, pulsing dots, branded clock pill.
       ==================================================== */
    #sceneTechnical {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      overflow: hidden;
      font-family: var(--sans, system-ui, sans-serif);
    }
    /* Layer 1: floating color orbs that drift slowly */
    #sceneTechnical::before {
      content: "";
      position: absolute; inset: -15%;
      background:
        radial-gradient(1000px 700px at 18% 22%, rgba(106,228,255,.30), transparent 55%),
        radial-gradient(900px 650px at 82% 78%, rgba(165,110,255,.28), transparent 55%),
        radial-gradient(600px 400px at 50% 50%, rgba(255,196,0,.10), transparent 60%);
      filter: blur(4px);
      animation: techDrift 32s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes techDrift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(-2%, 2%) scale(1.05); }
      100% { transform: translate(2%, -1.5%) scale(1); }
    }
    /* Layer 2: faint grid overlay (broadcast feel) */
    #sceneTechnical::after {
      content: "";
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
      pointer-events: none;
      z-index: 1;
    }

    #sceneTechnical .techInner {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 80px;
      gap: 28px;
    }

    /* Top "PAUZA TRANSMISJI" pill */
    #sceneTechnical .techBadge {
      display: inline-flex; align-items: center; gap: 14px;
      padding: 10px 22px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,196,0,.12), rgba(255,77,109,.10));
      border: 1px solid rgba(255,196,0,.40);
      box-shadow: 0 8px 30px rgba(0,0,0,.35), 0 0 40px rgba(255,196,0,.10);
      backdrop-filter: blur(12px);
      font-size: 14px; font-weight: 800; letter-spacing: 4px;
      text-transform: uppercase; color: #ffd37a;
    }
    #sceneTechnical .techBadge .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ffc400;
      box-shadow: 0 0 14px rgba(255,196,0,.9), 0 0 30px rgba(255,196,0,.5);
      animation: techDotPulse 1.4s ease-in-out infinite;
    }
    @keyframes techDotPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.4); opacity: .7; }
    }

    /* Gigantic gradient title with shimmer animation */
    #sceneTechnical .techTitle {
      margin: 0;
      font-size: clamp(60px, 7vw, 110px);
      font-weight: 900;
      letter-spacing: clamp(2px, 0.4vw, 6px);
      text-transform: uppercase;
      line-height: 1;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,.95) 0%,
        #6ae4ff 25%,
        rgba(255,255,255,.95) 50%,
        #a56eff 75%,
        rgba(255,255,255,.95) 100%
      );
      background-size: 250% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: techShimmer 6s ease-in-out infinite;
      text-shadow: 0 20px 60px rgba(0,0,0,.55);
      filter: drop-shadow(0 0 40px rgba(106,228,255,.25));
    }
    @keyframes techShimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Decorative gradient line under the title */
    #sceneTechnical .techRule {
      width: min(60%, 640px); height: 2px;
      background: linear-gradient(90deg, transparent, #6ae4ff, #a56eff, #ffc400, transparent);
      opacity: .6;
      margin-top: -12px;
    }

    #sceneTechnical .techSub {
      margin: 0;
      font-size: clamp(20px, 1.8vw, 30px);
      color: rgba(255,255,255,.78);
      max-width: 1100px;
      line-height: 1.3;
      font-weight: 500;
      letter-spacing: .3px;
    }

    /* Loading dots under the subtitle */
    #sceneTechnical .techDots {
      display: inline-flex; gap: 12px; margin-top: 6px;
    }
    #sceneTechnical .techDots span {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent, #6ae4ff);
      box-shadow: 0 0 14px rgba(106,228,255,.6);
      animation: techDotsBounce 1.4s ease-in-out infinite;
    }
    #sceneTechnical .techDots span:nth-child(2) { animation-delay: .2s; background: #a56eff; box-shadow: 0 0 14px rgba(165,110,255,.6); }
    #sceneTechnical .techDots span:nth-child(3) { animation-delay: .4s; background: #ffc400; box-shadow: 0 0 14px rgba(255,196,0,.6); }
    @keyframes techDotsBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .5; }
      30%           { transform: translateY(-8px); opacity: 1; }
    }

    /* Bottom bar: clock + brand */
    #sceneTechnical .techBar {
      margin-top: 20px;
      display: flex; gap: 22px; align-items: center;
      padding: 16px 28px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(8,12,24,.72), rgba(13,19,36,.60));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow:
        0 18px 50px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter: blur(14px);
    }
    #sceneTechnical .techClock {
      font-family: var(--mono, monospace);
      font-size: 26px;
      font-weight: 900;
      color: rgba(255,255,255,.96);
      letter-spacing: 2px;
      text-shadow: 0 0 18px rgba(106,228,255,.35);
    }
    #sceneTechnical .techSep {
      width: 1px; height: 20px;
      background: rgba(255,255,255,.18);
    }
    #sceneTechnical .techHint {
      font-size: 13px;
      color: rgba(255,255,255,.7);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
    }
    #sceneTechnical .techHint strong {
      color: var(--accent, #6ae4ff);
      letter-spacing: 1px;
      margin-right: 2px;
    }

    /* == STAŁE TŁA == */
    .scene-technical,
    #sceneTechnical { background: #070A12 !important; }
    #sceneSponsors  { background: #070A12 !important; }

    /* ── Break scene (iframed break-v2.html) ── */
    #sceneBreak {
      position: absolute; inset: 0;
      background: #070A12 !important;
      font-family: var(--sans);
      overflow: hidden;
    }
    #breakFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .brkHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 52px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }
    .brkBadge {
      font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
      padding: 5px 14px; border-radius: 999px;
      background: rgba(106,228,255,.15); border: 1px solid rgba(106,228,255,.3);
      color: var(--accent, #6AE4FF);
    }
    .brkClock {
      font-family: var(--mono, monospace); font-size: 22px; font-weight: 900;
      color: rgba(255,255,255,.5); letter-spacing: 2px;
    }
    .brkBody {
      display: flex; flex: 1; overflow: hidden;
    }
    .brkLeft {
      flex: 1; padding: 20px 28px 24px 52px; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .brkSectionLabel {
      font-size: 10px; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,.35); margin-bottom: 12px; margin-top: 4px;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .brkSectionLabel::before {
      content: ''; display: inline-block; width: 3px; height: 12px;
      border-radius: 2px; background: var(--accent, #6AE4FF);
    }
    .brkTablesGrid {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
      flex: 1;
      min-height: 0;
    }
    .brkGroup {
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.08); border-radius: 14px;
      padding: 12px 20px; overflow: hidden;
      display: flex; flex-direction: column; min-height: 0;
    }
    .brkGroupTitle {
      font-size: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent, #6AE4FF); margin-bottom: 6px; flex-shrink: 0;
    }
    .brkTable {
      width: 100%; border-collapse: collapse; font-size: 15px; flex: 1; min-height: 0;
    }
    .brkTable thead { flex-shrink: 0; }
    .brkTable th {
      font-size: 10px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,.35); padding: 0 8px 6px; text-align: center;
    }
    .brkTable th.name { text-align: left; }
    .brkTable td {
      padding: 6px 8px; text-align: center; color: rgba(255,255,255,.82);
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .brkTable td.pos { color: rgba(255,255,255,.35); font-weight: 700; font-size: 11px; width: 18px; }
    .brkTable td.name { text-align: left; font-weight: 700; color: rgba(255,255,255,.95);
      max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brkTable tbody tr:first-child td { padding-top: 8px; }
    .brkTable tbody tr:last-child td  { border-bottom: none; }

    .brkRight {
      width: 420px; flex-shrink: 0; border-left: 1px solid rgba(255,255,255,.07);
      padding: 24px 36px; display: flex; flex-direction: column; gap: 24px; overflow: hidden;
    }
    .brkPanel { display: flex; flex-direction: column; }
    .brkItem {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: 15px;
    }
    .brkItem:last-child { border-bottom: none; }
    .brkItem span { color: rgba(255,255,255,.82); font-weight: 600; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brkItem b { color: #d9ff7a; font-weight: 900; font-size: 15px; flex-shrink: 0; }
    .brkProgramBox {
      background: rgba(106,228,255,.07); border: 1px solid rgba(106,228,255,.18);
      border-radius: 14px; padding: 18px 20px; margin-top: 4px;
    }
    .brkProgramTeams { font-size: 17px; font-weight: 900; color: rgba(255,255,255,.95); line-height: 1.3; }
    .brkProgramScore { font-size: 38px; font-weight: 900; color: #6AE4FF; margin-top: 8px; letter-spacing: 2px; }
    .brkProgramSets  { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 4px; }

  </style>
</head>
<body>
  <div class="overlayViewport">
    <div class="overlayStage" id="stage">

      <!-- GAME -->
      <div class="scene scene-game active" id="sceneGame">
        <div class="gameHUD">
          <div class="gameMeta">
            <div class="metaPill" id="metaStage">—</div>
            <div class="metaPill" id="metaSet">SET —/3</div>
          </div>
          <div class="gameCard">
            <div class="gameCardTeam" id="rowA">
              <div class="gameCardInfo teamPill">
                <div class="teamName" id="aName">—</div>
              </div>
              <div class="gameCardMeta">
                <div class="setsLabel">sety</div>
                <div class="setsVal" id="aSets">0</div>
              </div>
              <div class="gameCardScore">
                <div class="pointsNum scoreBox" id="aScore">0</div>
              </div>
            </div>
            <div class="gameCardDivider"></div>
            <div class="gameCardTeam" id="rowB">
              <div class="gameCardInfo teamPill">
                <div class="teamName" id="bName">—</div>
              </div>
              <div class="gameCardMeta">
                <div class="setsLabel">sety</div>
                <div class="setsVal" id="bSets">0</div>
              </div>
              <div class="gameCardScore">
                <div class="pointsNum scoreBox" id="bScore">0</div>
              </div>
            </div>
            <div class="gameCardBottom" id="gameCardBottom" style="display:none">
              <div class="setHistoryInline" id="setHistory"></div>
              <div class="momentumInlineWrap" id="momentumWrap" style="display:none">
                <div class="momentumInlineBar">
                  <div class="momentumFill momentumA" id="momentumA" style="width:50%"></div>
                  <div class="momentumSep"></div>
                  <div class="momentumFill momentumB" id="momentumB" style="width:50%"></div>
                </div>
                <div class="momentumLabel" id="momentumLabel"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- BREAK — rendered via break-v2.html in an iframe so the scene uses
           the polished display-style layout. The iframe inherits the ?t=slug
           from overlay's URL so it subscribes to the same tournament.
           Old inline break content removed; break.js + overlay.renderBreak()
           null-check the old IDs and safely no-op. -->
      <div class="scene" id="sceneBreak">
        <iframe id="breakFrame" src="about:blank" allow="autoplay" title="Przerwa"></iframe>
      </div>
      <script>
        (function () {
          var f = document.getElementById("breakFrame");
          if (f) f.src = "break-v2.html" + (window.location.search || "");
        })();
      </script>

      <!-- TECHNICAL -->
      <div class="scene scene-technical" id="sceneTechnical">
        <div class="techInner">
          <div class="techBadge">
            <span class="dot"></span>
            <span>Pauza transmisji</span>
          </div>
          <h1 class="techTitle" id="techTitle">ZARAZ WRACAMY</h1>
          <div class="techRule"></div>
          <div class="techSub" id="techSubtitle">Trwają przygotowania do kolejnego meczu</div>
          <div class="techDots"><span></span><span></span><span></span></div>
          <div class="techBar">
            <div class="techClock" id="techClock">--:--:--</div>
            <div class="techSep"></div>
            <div class="techHint"><strong>Volleyball</strong>Pro</div>
          </div>
        </div>
      </div>

      <!-- SPONSORS -->
      <div id="sceneSponsors" class="scene"></div>

      <!-- SPONSOR WIDGET (top-right corner) -->
      <div id="sponsorWidget"></div>

    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/util.js"></script>
  <script src="js/ui-shared.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/state.js"></script>
  <script src="js/break.js"></script>
  <script src="js/overlay.js"></script>
  <script src="js/overlay-anim.js"></script>
  <script src="js/overlay-sponsors-rotator.js"></script>
  <script src="js/overlay-sponsors-widget.js"></script>
  <script src="js/overlay-game-fx.js"></script>

  <script>
  (function(){
    const el = document.getElementById("techClock");
    function tick(){
      const d=new Date();
      const hh=String(d.getHours()).padStart(2,'0');
      const mm=String(d.getMinutes()).padStart(2,'0');
      const ss=String(d.getSeconds()).padStart(2,'0');
      if(el) el.textContent = `${hh}:${mm}:${ss}`;
    }
    tick(); setInterval(tick,1000);
  })();
  </script>

</body>
</html>
